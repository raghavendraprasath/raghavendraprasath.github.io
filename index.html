<style>
  :root{
    --cream:#F4F1EA; --ink:#2A2925; --body:#5A6573; --muted:#959aa0;
    --line:#E3DFD4; --line-soft:#EAE6DC;
    --serif:"Spectral",Georgia,serif; --sans:"Inter",system-ui,-apple-system,sans-serif;
    --maxw:960px;
    --a-about:#B5532E; --a-work:#3F72B0; --a-education:#5C63C4; --a-skills:#2F9E83; --a-projects:#C99A2B;
    --accent:var(--a-about);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
  body{margin:0;background:var(--cream);color:var(--body);font-family:var(--sans);font-size:17px;line-height:1.62;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  a{color:inherit;text-decoration:none;}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:3px;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 32px;}
  header.site{padding:40px 0 12px;}
  .head-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap;}
  .brand .name{font-family:var(--serif);font-weight:700;color:var(--ink);font-size:1.5rem;line-height:1.1;}
  .brand .sub{font-family:var(--sans);font-size:0.92rem;color:var(--body);margin-top:4px;}
  nav.tabs{display:flex;gap:30px;padding-top:6px;}
  nav.tabs button{background:none;border:none;cursor:pointer;font-family:var(--sans);font-size:1rem;color:var(--body);padding:4px 2px 8px;position:relative;}
  nav.tabs button:hover{color:var(--ink);}
  nav.tabs button.active{color:var(--ink);font-weight:500;}
  nav.tabs button.active::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;border-radius:2px;background:var(--tab-accent,var(--ink));}
  @media(max-width:680px){nav.tabs{gap:18px;width:100%;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}nav.tabs button{font-size:0.95rem;white-space:nowrap;}}
  main{padding:36px 0 0;min-height:60vh;}
  .page{display:none;animation:fade .35s ease;}
  .page.show{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .page-title{font-family:var(--serif);font-weight:700;color:var(--ink);font-size:clamp(2.4rem,5vw,3.1rem);line-height:1;margin:0 0 14px;letter-spacing:-0.01em;}
  .title-rule{width:54px;height:3px;border-radius:3px;background:var(--accent);margin-bottom:22px;}
  .page-desc{font-size:1.06rem;color:var(--body);max-width:60ch;margin:0 0 40px;}
  .about-grid{display:grid;grid-template-columns:230px 1fr;gap:48px;align-items:start;}
  .avatar-wrap{width:230px;height:230px;border-radius:50%;padding:3px;background:linear-gradient(155deg,#cdd8ea 0%,#e7d7cf 100%);}
  .avatar-wrap img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;border:3px solid var(--cream);}
  .about-text p{font-size:1.08rem;color:var(--body);margin:0 0 18px;}
  .about-text p strong{color:var(--ink);font-weight:600;}
  .about-wide{font-size:1.08rem;color:var(--body);margin:6px 0 0;max-width:74ch;}
  .greet{color:var(--ink);}
  .social{display:flex;flex-wrap:wrap;gap:22px;margin:34px 0 18px;}
  .social a{display:inline-flex;align-items:center;gap:8px;font-size:0.98rem;color:var(--body);transition:color .15s;}
  .social a:hover{color:var(--ink);}
  .social svg{width:17px;height:17px;flex:none;}
  .art{position:relative;margin:54px 0 8px;}
  .art-cap{position:absolute;bottom:100%;right:0;margin-bottom:12px;font-size:0.82rem;color:var(--muted);opacity:0;transition:opacity .35s ease;max-width:62%;text-align:right;pointer-events:none;}
  .art:hover .art-cap,.art:focus-within .art-cap{opacity:1;}
  @media (hover:none){.art-cap{opacity:.85;}}
  .skyline{width:min(420px,70%);height:auto;opacity:.85;display:block;margin-left:auto;color:inherit;}
  @media(max-width:720px){.about-grid{grid-template-columns:1fr;gap:28px;}.avatar-wrap{width:190px;height:190px;}}
  .entry{display:grid;grid-template-columns:1fr auto;gap:24px;padding:26px 0;border-bottom:1px solid var(--line);}
  .entry:last-child{border-bottom:none;}
  .entry-main{display:flex;gap:16px;}
  .logo{width:38px;height:38px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;color:#fff;font-size:1.05rem;margin-top:2px;}
  .entry h3{font-family:var(--serif);font-weight:700;color:var(--ink);font-size:1.32rem;margin:0;line-height:1.1;}
  .entry .post{font-size:1rem;color:var(--body);margin:3px 0 0;}
  .entry .desc{font-size:0.99rem;color:var(--body);margin:12px 0 0;max-width:66ch;}
  .entry-side{text-align:right;font-size:0.9rem;color:var(--muted);line-height:1.5;white-space:nowrap;padding-top:4px;}
  .tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
  .pill{font-size:0.82rem;padding:3px 11px;border-radius:999px;border:1px solid;line-height:1.5;}
  .p-rust{color:#B5532E;border-color:#E1C2B1;background:#F6EBE4;}
  .p-blue{color:#3F72B0;border-color:#BFD2E7;background:#EAF1F8;}
  .p-teal{color:#2F9E83;border-color:#B0DCD0;background:#E6F4F0;}
  .p-indigo{color:#5C63C4;border-color:#C7C9EC;background:#ECEDF9;}
  .p-gold{color:#B0851C;border-color:#E2D29D;background:#F7F0DC;}
  .p-pink{color:#B5478F;border-color:#E5C1DB;background:#F8ECF4;}

const SKYLINE = `<svg class="skyline" viewBox="0 0 520 90" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M2 88 H518" stroke="currentColor" stroke-width="1.2"/><path d="M30 88 V58 H58 V88" stroke="currentColor" stroke-width="1.1"/><path d="M40 58 V48 H48 V58" stroke="currentColor" stroke-width="1.1"/><path d="M66 88 V66 H86 V88" stroke="currentColor" stroke-width="1.1"/><path d="M120 88 V40 M120 40 L100 88 M120 40 L140 88 M120 40 L108 88 M120 40 L132 88" stroke="currentColor" stroke-width="1"/><path d="M120 40 V28" stroke="currentColor" stroke-width="1"/><path d="M160 88 V40 M160 40 L142 88 M160 40 L178 88 M160 40 L150 88 M160 40 L170 88" stroke="currentColor" stroke-width="1"/><path d="M160 40 V28" stroke="currentColor" stroke-width="1"/><path d="M120 50 H160 M120 60 H160" stroke="currentColor" stroke-width="0.8"/><path d="M210 88 V44 H230 V88" stroke="currentColor" stroke-width="1.1"/><path d="M214 44 V36 H226 V44" stroke="currentColor" stroke-width="1.1"/><path d="M245 88 V54 H262 V88" stroke="currentColor" stroke-width="1.1"/><path d="M285 88 V30 H305 V88" stroke="currentColor" stroke-width="1.1"/><path d="M289 30 V22 H301 V30" stroke="currentColor" stroke-width="1.1"/><circle cx="295" cy="40" r="4" stroke="currentColor" stroke-width="1"/><path d="M295 30 V18 L299 22" stroke="currentColor" stroke-width="1"/><path d="M330 88 V34 H352 V88" stroke="currentColor" stroke-width="1.1"/><path d="M337 34 V26 H345 V34" stroke="currentColor" stroke-width="1.1"/><path d="M368 88 V60 H386 V88" stroke="currentColor" stroke-width="1.1"/><path d="M430 88 C436 82 452 82 458 88" stroke="currentColor" stroke-width="1.1"/><path d="M444 82 V52" stroke="currentColor" stroke-width="1"/><path d="M444 54 L432 78 H444 Z" stroke="currentColor" stroke-width="1"/><path d="M444 54 L458 78 H444" stroke="currentColor" stroke-width="1"/><path d="M478 88 V64 H498 V88" stroke="currentColor" stroke-width="1.1"/></svg>`;
function artBlock(accent, caption){
  return `<div class="art" style="color:${accent}">${caption?`<div class="art-cap">${caption}</div>`:''}${SKYLINE}</div>`;
}

const TAGCOLORS = ['p-rust','p-blue','p-teal','p-indigo','p-gold','p-pink','p-slate'];
const SKILLCOLORS = ['var(--a-education)','var(--a-work)','var(--a-about)','var(--a-projects)','var(--a-skills)'];
const ICONS = {
  email:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>`,
  linkedin:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5A2.5 2.5 0 1 1 0 3.5a2.5 2.5 0 0 1 4.98 0ZM.5 8h4V24h-4V8Zm7 0h3.8v2.2h.05c.53-1 1.83-2.2 3.77-2.2 4 0 4.75 2.65 4.75 6.1V24h-4v-7.1c0-1.7 0-3.9-2.37-3.9-2.38 0-2.75 1.85-2.75 3.77V24h-4V8Z"/></svg>`,
  github:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.2.8-.5v-2c-3.2.7-3.9-1.4-3.9-1.4-.5-1.3-1.3-1.7-1.3-1.7-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.3 3.4 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.4-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.4 11.4 0 0 1 6 0C17 5 18 5.3 18 5.3c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.6.8.5 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5Z"/></svg>`,
  publication:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5a2 2 0 0 1 2-2h8l6 6v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5Z"/><path d="M14 3v6h6"/></svg>`,
  resume:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M5 21h14"/></svg>`
};
const SOCIAL_ORDER = [['email','Email'],['linkedin','LinkedIn'],['github','GitHub'],['publication','Publication'],['resume','Résumé']];

const pills = (tags) => (tags||[]).map((t,i)=>`<span class="pill ${TAGCOLORS[i%TAGCOLORS.length]}">${t}</span>`).join('');
const pageHead = (m) => `<h1 class="page-title">${m.title}</h1><div class="title-rule"></div>${m.desc?`<p class="page-desc">${m.desc}</p>`:''}`;
const entryHTML = (e) => `<div class="entry"><div class="entry-main"><span class="logo" style="background:${e.logoColor}">${e.logo}</span><div><h3>${e.org}</h3><p class="post">${e.role}</p>${e.desc?`<p class="desc">${e.desc}</p>`:''}${(e.tags&&e.tags.length)?`<div class="tagrow">${pills(e.tags)}</div>`:''}</div></div><div class="entry-side">${e.location}<br>${e.dates}</div></div>`;

function renderAbout(){
  const p = DATA.profile;
  const social = SOCIAL_ORDER.map(([k,label])=>{
    const href = (k==='email') ? 'mailto:'+p.links.email : p.links[k];
    if(!href) return '';
    const ext = (k==='email') ? '' : ' target="_blank" rel="noopener"';
    const dv = (k==='resume') ? ' data-viewer="1"' : '';
    return `<a href="${href}"${ext}${dv} aria-label="${label}">${ICONS[k]}${label}</a>`;
  }).join('');
  const bio = p.bio.map((para,i)=>`<p>${i===0?`<span class="greet">${p.greeting}</span> &mdash; `:''}${para}</p>`).join('');
  document.getElementById('page-about').innerHTML =
    `<div class="about-grid"><div class="avatar-wrap"><img src="${PHOTO}" alt="Portrait of ${p.name}" width="520" height="520"></div><div class="about-text">${bio}</div></div>`
    + `<p class="about-wide">${p.bioWide}</p>`
    + `<div class="social">${social}</div>` + artBlock('var(--a-about)', DATA.profile.artCaption);
}
function renderEntries(key){
  const items = DATA[key].map(entryHTML).join('');
  const accent = (key==='work') ? 'var(--a-work)' : 'var(--a-education)';
  const art = artBlock(accent, DATA.pages[key].caption);
  document.getElementById('page-'+key).innerHTML = pageHead(DATA.pages[key]) + items + art;
}
function renderSkills(){
  const cards = DATA.skills.map((c,i)=>{
    const color = c.color || SKILLCOLORS[i%SKILLCOLORS.length];
    const chips = c.items.map(it=>`<span class="schip"><span class="dot"></span>${it}</span>`).join('');
    return `<div class="skill-card" style="--sc:${color}"><h4>${c.title}</h4><div class="chips">${chips}</div></div>`;
  }).join('');
  document.getElementById('page-skills').innerHTML = pageHead(DATA.pages.skills) + `<div class="skill-grid">${cards}</div>` + artBlock('var(--a-skills)', DATA.pages.skills.caption);
}
function renderProjects(){
  const items = DATA.projects.map(pr=>{
    const flag = pr.featured ? `<span class="feat-flag">Featured</span>` : '';
    const link = pr.link ? `<a href="${pr.link}" target="_blank" rel="noopener" class="arrow">↗</a>` : '';
    return `<div class="proj"><div class="proj-head"><h3>${pr.title}${flag}</h3><span class="proj-meta">${pr.meta||''} ${link}</span></div>${pr.desc?`<p>${pr.desc}</p>`:''}${(pr.tags&&pr.tags.length)?`<div class="tagrow">${pills(pr.tags)}</div>`:''}</div>`;
  }).join('');
  const pub = DATA.publication;
  const pubHTML = pub ? `<div class="pub-note"><div class="pt">Publication</div><p>${pub.text} ${pub.note?`<span class="star">${pub.note}</span>`:''}${pub.doi?` &nbsp;·&nbsp; <a href="${pub.doi}" target="_blank" rel="noopener">${pub.doiLabel||pub.doi}</a>`:''}</p></div>` : '';
  document.getElementById('page-projects').innerHTML = pageHead(DATA.pages.projects) + items + pubHTML + artBlock('var(--a-projects)', DATA.pages.projects.caption);
}

function init(){
  document.getElementById('brand-name').textContent = DATA.profile.name;
  document.getElementById('brand-sub').textContent = DATA.profile.location;
  document.getElementById('footer-line').innerHTML = `© 2026 · ${DATA.profile.name} · <a href="mailto:${DATA.profile.links.email}">Contact</a>`;
  renderAbout(); renderEntries('work'); renderEntries('education'); renderSkills(); renderProjects();

  const tabs = document.querySelectorAll('#tabs button');
  const pages = document.querySelectorAll('.page');
  function show(name){
    pages.forEach(p=>p.classList.toggle('show', p.id==='page-'+name));
    tabs.forEach(t=>t.classList.toggle('active', t.dataset.page===name));
    try{ history.replaceState(null,'','#'+name); }catch(e){}
    window.scrollTo({top:0,behavior:'auto'});
  }
  tabs.forEach(t=>t.addEventListener('click',()=>show(t.dataset.page)));
  const start = (location.hash||'').replace('#','');
  if(['about','work','education','skills','projects'].indexOf(start)>-1) show(start);

  // ----- résumé slide-out viewer -----
  const viewer = document.getElementById('viewer');
  const vFrame = document.getElementById('viewer-frame');
  const vLabel = document.getElementById('viewer-label');
  const vOpen  = document.getElementById('viewer-open');
  const vNote  = document.getElementById('viewer-note');
  let lastFocus = null;
  function openViewer(url, label){
    lastFocus = document.activeElement;
    vLabel.textContent = label || 'Résumé';
    vOpen.setAttribute('href', url || '#');
    const ready = url && url !== 'RESUME_URL';
    if(ready){
      vFrame.style.display = 'block'; vFrame.src = url; vNote.hidden = true;
    } else {
      vFrame.style.display = 'none'; vFrame.removeAttribute('src');
      vNote.hidden = false;
      vNote.textContent = 'Add your résumé PDF link in the DATA section (profile.links.resume), and place the PDF next to this page, to preview it here.';
    }
    viewer.hidden = false;
    requestAnimationFrame(()=>viewer.classList.add('open'));
    document.body.style.overflow = 'hidden';
    document.getElementById('viewer-close').focus();
  }
  function closeViewer(){
    viewer.classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(()=>{ viewer.hidden = true; vFrame.removeAttribute('src'); }, 300);
    if(lastFocus && lastFocus.focus) lastFocus.focus();
  }
  document.addEventListener('click', function(e){
    const a = e.target.closest('a[data-viewer]');
    if(a && e.button===0 && !e.metaKey && !e.ctrlKey && !e.shiftKey && !e.altKey){
      e.preventDefault();
      openViewer(a.getAttribute('href'), a.getAttribute('aria-label'));
      return;
    }
    if(e.target.closest('[data-close]')) closeViewer();
  });
  document.addEventListener('keydown', function(e){
    if(e.key==='Escape' && !viewer.hidden) closeViewer();
  });
}
document.addEventListener('DOMContentLoaded', init);
</script>
